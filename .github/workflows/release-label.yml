name: Release label

on:
  pull_request:
    types:
      - opened
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  release-label:
    name: Validate release label
    if: github.event.pull_request.base.ref != 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Validate exactly one release:* label
        uses: actions/github-script@v7
        with:
          script: |
            const releaseLabels = new Set([
              'release:none',
              'release:patch',
              'release:minor',
              'release:major',
            ]);

            const pr = context.payload.pull_request;
            const matchedLabels = (pr.labels ?? [])
              .map((label) => label?.name)
              .filter((label) => releaseLabels.has(label));

            if (matchedLabels.length !== 1) {
              core.setFailed(
                `PR #${pr.number} (${pr.title}) must have exactly one release:* label, found ${matchedLabels.length}.`
              );
              return;
            }

            core.info(`Validated release label ${matchedLabels[0]} for PR #${pr.number}.`);
