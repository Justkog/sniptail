name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-label:
    name: Validate release label
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref != 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Validate exactly one release:* label
        uses: actions/github-script@v7
        with:
          script: |
            const releaseLabels = new Set([
              'release:none',
              'release:patch',
              'release:minor',
              'release:major',
            ]);

            const pr = context.payload.pull_request;
            const matchedLabels = (pr.labels ?? [])
              .map((label) => label?.name)
              .filter((label) => releaseLabels.has(label));

            if (matchedLabels.length !== 1) {
              core.setFailed(
                `PR #${pr.number} (${pr.title}) must have exactly one release:* label, found ${matchedLabels.length}.`
              );
              return;
            }

            core.info(`Validated release label ${matchedLabels[0]} for PR #${pr.number}.`);

  ci:
    name: CI (Node 22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0
          run_install: false

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tests
        run: pnpm test:run

      # - name: Check
      #   run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Smoke test (dry run)
        run: pnpm run smoke:bot
