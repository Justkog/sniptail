name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      should_release: ${{ steps.resolve.outputs.should_release }}
      release_reason: ${{ steps.resolve.outputs.release_reason }}
      previous_tag: ${{ steps.resolve.outputs.previous_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag from merged PR labels
        id: resolve
        uses: actions/github-script@v7
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          script: |
            const { execFileSync } = require('node:child_process');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = process.env.GITHUB_SHA;

            const execGit = (...args) =>
              execFileSync('git', args, { encoding: 'utf8' }).trim();

            const releaseLevels = {
              'release:none': 0,
              'release:patch': 1,
              'release:minor': 2,
              'release:major': 3,
            };
            const levelToName = ['none', 'patch', 'minor', 'major'];

            const tags = execGit('tag', '--merged', headSha, '--list', 'v*', '--sort=-version:refname')
              .split('\n')
              .map((tag) => tag.trim())
              .filter(Boolean);
            const existingTag = execGit('tag', '--points-at', headSha, '--list', 'v*')
              .split('\n')
              .map((tag) => tag.trim())
              .filter(Boolean)
              .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }))
              .at(-1) ?? '';
            const previousTag = tags.find((tag) => tag !== existingTag) ?? '';

            if (!previousTag && !existingTag) {
              core.setFailed('No previous v* tag found. Seed the repository with an initial release tag before using automatic main releases.');
              return;
            }

            if (existingTag) {
              core.info(`Using existing release tag ${existingTag} for ${headSha}.`);

              // Check if a release already exists for this tag and has assets.
              let release = null;
              try {
                const response = await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag: existingTag,
                });
                release = response.data;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                // If the release is not found (404), treat it as no existing release.
              }

              const hasAssets =
                release && Array.isArray(release.assets) && release.assets.length > 0;

              core.setOutput('release_tag', existingTag);
              core.setOutput('should_release', hasAssets ? 'false' : 'true');
              core.setOutput(
                'release_reason',
                hasAssets
                  ? 'Existing tag and release assets found for the current main commit; skipping rebuild.'
                  : 'Reusing existing tag on the current main commit.'
              );
              core.setOutput('previous_tag', previousTag);
              return;
            }

            const commitRange = `${previousTag}..${headSha}`;
            const commits = execGit('rev-list', '--reverse', commitRange)
              .split('\n')
              .map((sha) => sha.trim())
              .filter(Boolean);

            if (commits.length === 0) {
              core.setOutput('release_tag', '');
              core.setOutput('should_release', 'false');
              core.setOutput('release_reason', `No commits found after ${previousTag}.`);
              core.setOutput('previous_tag', previousTag);
              return;
            }

            const prs = new Map();

            for (const commitSha of commits) {
              const associatedPulls = await github.paginate(
                'GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls',
                {
                  owner,
                  repo,
                  commit_sha: commitSha,
                }
              );

              for (const pr of associatedPulls) {
                if (prs.has(pr.number)) {
                  continue;
                }

                const labels = (pr.labels ?? [])
                  .map((label) => (typeof label === 'string' ? label : label.name))
                  .filter(Boolean);

                prs.set(pr.number, {
                  number: pr.number,
                  title: pr.title,
                  baseRef: pr.base?.ref ?? '',
                  headRef: pr.head?.ref ?? '',
                  labels,
                });
              }
            }

            const releasePrs = [...prs.values()].filter((pr) => pr.baseRef === 'staging');

            if (releasePrs.length === 0) {
              const reason = `Could not resolve any merged pull requests into staging in ${commitRange}. This likely indicates a direct commit to main or a main merge that did not include staging-targeted PR commits; skipping release creation.`;
              core.info(reason);
              core.setOutput('release_tag', '');
              core.setOutput('should_release', 'false');
              core.setOutput('release_reason', reason);
              core.setOutput('previous_tag', previousTag);
              return;
            }

            let highestLevel = 0;

            for (const pr of releasePrs) {
              const matchedLabels = pr.labels.filter((label) => Object.hasOwn(releaseLevels, label));

              if (matchedLabels.length !== 1) {
                core.setFailed(
                  `PR #${pr.number} (${pr.title}) must have exactly one release:* label, found ${matchedLabels.length}.`
                );
                return;
              }

              highestLevel = Math.max(highestLevel, releaseLevels[matchedLabels[0]]);
            }

            if (highestLevel === 0) {
              core.info(`All merged PRs since ${previousTag} were labeled release:none; skipping release creation.`);
              core.setOutput('release_tag', '');
              core.setOutput('should_release', 'false');
              core.setOutput('release_reason', `All merged PRs since ${previousTag} were release:none.`);
              core.setOutput('previous_tag', previousTag);
              return;
            }

            const match = /^v(\d+)\.(\d+)\.(\d+)$/.exec(previousTag);
            if (!match) {
              core.setFailed(`Previous tag ${previousTag} does not match v<major>.<minor>.<patch>.`);
              return;
            }

            let [major, minor, patch] = match.slice(1).map((value) => Number.parseInt(value, 10));
            const bump = levelToName[highestLevel];

            if (bump === 'major') {
              major += 1;
              minor = 0;
              patch = 0;
            } else if (bump === 'minor') {
              minor += 1;
              patch = 0;
            } else {
              patch += 1;
            }

            const nextTag = `v${major}.${minor}.${patch}`;
            core.info(`Resolved ${nextTag} from ${releasePrs.length} merged PR(s) since ${previousTag}; highest impact ${bump}.`);

            core.setOutput('release_tag', nextTag);
            core.setOutput('should_release', 'true');
            core.setOutput('release_reason', `Resolved ${nextTag} from merged PR labels since ${previousTag}.`);
            core.setOutput('previous_tag', previousTag);

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.should_release == 'true'

    steps:
      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true

  release:
    name: Build release assets (${{ matrix.os_name }}-${{ matrix.arch }})
    needs:
      - resolve
      - create-release
    runs-on: ${{ matrix.os }}
    if: needs.resolve.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            arch: x64
          - os: macos-15-intel
            os_name: darwin
            arch: x64
          - os: macos-latest
            os_name: darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Validate tag name
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve.outputs.release_tag }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Invalid release tag: ${tag}"
            echo "Expected v<major>.<minor>.<patch> (optionally with suffix)."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0
          run_install: false

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package release
        shell: bash
        run: |
          scripts/package-release.sh \
            --version "${{ needs.resolve.outputs.release_tag }}" \
            --os "${{ matrix.os_name }}" \
            --arch "${{ matrix.arch }}"

      - name: Smoke test packaged binary
        shell: bash
        run: |
          set -euo pipefail
          name="sniptail-${{ needs.resolve.outputs.release_tag }}-${{ matrix.os_name }}-${{ matrix.arch }}"
          stage_root="release/${name}"
          if [[ ! -x "${stage_root}/bin/sniptail" ]]; then
            echo "Missing packaged sniptail binary at ${stage_root}/bin/sniptail"
            exit 1
          fi

          if [[ ! -f "${stage_root}/apps/local/dist/localProcessRuntime.js" ]]; then
            echo "Missing packaged local runtime entry at ${stage_root}/apps/local/dist/localProcessRuntime.js"
            exit 1
          fi

          "${stage_root}/bin/sniptail" --help >/dev/null

          symlink_root="$(mktemp -d)"
          ln -s "${PWD}/${stage_root}" "${symlink_root}/current"
          "${symlink_root}/current/bin/sniptail" bot --help >/dev/null

          tmp_registry="$(mktemp -d)"
          trap 'rm -rf "${tmp_registry}" "${symlink_root}"' EXIT
          JOB_REGISTRY_DB=sqlite \
          JOB_REGISTRY_PATH="${tmp_registry}" \
          QUEUE_DRIVER=inproc \
          "${stage_root}/bin/sniptail" db status --scope worker --json >/dev/null

          "${stage_root}/bin/sniptail" slack-manifest --help >/dev/null

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          files: |
            sniptail-${{ needs.resolve.outputs.release_tag }}-${{ matrix.os_name }}-${{ matrix.arch }}.tar.xz
            sniptail-${{ needs.resolve.outputs.release_tag }}-${{ matrix.os_name }}-${{ matrix.arch }}.sha256
